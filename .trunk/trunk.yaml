# Trunk configuration for Next.js/TypeScript/React project
# https://docs.trunk.io/reference/trunk-yaml
version: 0.1

cli:
  version: 1.25.0

plugins:
  sources:
    - id: trunk
      ref: v1.7.6
      uri: https://github.com/trunk-io/plugins

runtimes:
  enabled:
    - go@1.21.0
    - python@3.10.8
    - node@22.16.0

lint:
  enabled:
    # TypeScript/JavaScript - Biome is 35x faster than ESLint
    - checkov@3.2.513
    - markdownlint@0.48.0
    - biome@2.4.9
    - prettier@3.8.1
    
    # Git & Security
    - git-diff-check
    - gitleaks@8.29.0
    - trufflehog@3.90.13
    
    # Config files
    - yamllint@1.38.0
    - taplo@0.10.0
    - actionlint@1.7.8
    
    # Shell scripts
    - shellcheck@0.11.0
    - shfmt@3.6.0
    
    # SVG optimization
    - svgo@4.0.1
          
  ignore:
    - linters: [ALL]
      paths:
        - node_modules/**
        - .next/**
        - dist/**
        - build/**
        - coverage/**
        - "*.lock"
        - "*-lock.*"
        - generated/**
        - logs/**
        - .trunk/**
        - public/**

actions:
  disabled:
    - trunk-announce
  enabled:
    - trunk-upgrade-available
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
