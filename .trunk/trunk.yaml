# This file controls the behavior of Trunk: https://docs.trunk.io/cli
# To learn more about the format of this file, see https://docs.trunk.io/reference/trunk-yaml
version: 0.1
cli:
  version: 1.25.0
# Trunk provides extensibility via plugins. (https://docs.trunk.io/plugins)
plugins:
  sources:
    - id: trunk
      ref: v1.7.4
      uri: https://github.com/trunk-io/plugins
# Many linters and tools depend on runtimes - configure them here. (https://docs.trunk.io/runtimes)
runtimes:
  enabled:
    - go@1.21.0
    - node@22.16.0
    - python@3.10.8
# This is the section where you manage your linters. (https://docs.trunk.io/check/configuration)
lint:
  enabled:
    - prettier
    - yamllint@1.37.1
    - checkov@3.2.495
    - eslint@8.57.0
    - git-diff-check
    - markdownlint@0.46.0
    - osv-scanner@2.3.0
    - shellcheck@0.11.0
    - shfmt@3.6.0
    - svgo@4.0.0
    - taplo@0.10.0
    - trufflehog@3.91.2
    - ansible-lint@25.12.0
    - bandit@1.9.2
    - black@25.11.0
    - buf-lint@1.59.0
    - buildifier@8.2.1
    - cfnlint@1.42.0
    - eslint@7.30.0
    - gitleaks@8.29.0
    - gofmt@1.20.4
    - golangci-lint@1.64.8
    - hadolint@2.14.0
    - isort@7.0.0
    - markdownlint@0.28.1
    - mypy@1.19.0
    - prettier@2.3.2
    - pylint@4.0.4
    - rustfmt@1.65.0
    - semgrep@1.144.0
    - shellcheck@0.7.2
    - shfmt@3.3.1
  ignore:
    - linters: [ALL]
      paths:
        - node_modules/**
        - dist/**
        - build/**
        - coverage/**
        - '*.lock'
        - '*-lock.*'
        - generated/**
        - logs/**
        - prisma/**
actions:
  disabled:
    - trunk-announce
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
  enabled:
    - trunk-upgrade-available
